<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pro Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A functional, beautiful, and responsive calculator with history built using HTML, CSS, and JS.">
</head>
<body>
    <div class="app-container">
        <!-- Main Calculator Section -->
        <main class="calculator">
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            
            <div class="keypad">
                <button class="btn btn-action" data-action="clear">AC</button>
                <button class="btn btn-action" data-action="delete">DEL</button>
                <button class="btn btn-operator" data-action="operator" data-value="/">÷</button>
                <button class="btn btn-operator" data-action="operator" data-value="*">×</button>
                
                <button class="btn btn-number" data-value="7">7</button>
                <button class="btn btn-number" data-value="8">8</button>
                <button class="btn btn-number" data-value="9">9</button>
                <button class="btn btn-operator" data-action="operator" data-value="-">−</button>
                
                <button class="btn btn-number" data-value="4">4</button>
                <button class="btn btn-number" data-value="5">5</button>
                <button class="btn btn-number" data-value="6">6</button>
                <button class="btn btn-operator" data-action="operator" data-value="+">+</button>
                
                <button class="btn btn-number" data-value="1">1</button>
                <button class="btn btn-number" data-value="2">2</button>
                <button class="btn btn-number" data-value="3">3</button>
                <button class="btn btn-equals" data-action="calculate">=</button>
                
                <button class="btn btn-number zero" data-value="0">0</button>
                <button class="btn btn-number" data-value=".">.</button>
            </div>
        </main>
        
        <!-- Bonus: History Panel -->
        <aside class="history-panel">
            <div class="history-header">
                <h2>History</h2>
                <button id="clear-history" class="btn-clear-history">Clear</button>
            </div>
            <div class="history-list" id="history-list">
                <!-- History logs dynamically inserted here via JS -->
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
